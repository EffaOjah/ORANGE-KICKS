<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <style>
        body{
    background:#fff8f3;
    font-family:Arial, sans-serif;
}

.cart-container{
    max-width:1200px;
    margin:50px auto;
    padding:20px;
}

.cart-container h1{
    color:#ff6b00;
    margin-bottom:30px;
}

.cart-item{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;

    display:flex;
    align-items:center;
    gap:20px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.cart-item img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
}

.cart-item h3{
    margin-bottom:10px;
}

.cart-summary{
    background:white;
    padding:30px;
    border-radius:15px;
    margin-top:30px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

#checkout-btn{
    margin-top:20px;
    background:#25D366;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:50px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
}

#checkout-btn:hover{
    opacity:.9;
}

.cart-item button{
    background:#ff6b00;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:30px;
    cursor:pointer;
}

.empty-state{
    text-align:center;
    padding:80px 20px;
    background:white;
    border-radius:15px;
}

.empty-state a{
    display:inline-block;
    margin-top:20px;
    background:#ff6b00;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:30px;
}
    </style>
</head>
<body>

<h1>My Cart</h1>

<div id="cart-items"></div>

<h2 id="total"></h2>

<div class="cart-container">

    <h1>Shopping Cart</h1>

    <div id="cart-items"></div>

    <div class="cart-summary">
        <h2 id="total"></h2>

        <button id="checkout-btn">
            <i class="fa-brands fa-whatsapp"></i>
            Checkout via WhatsApp
        </button>
    </div>

</div>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>

</body>
</html>
